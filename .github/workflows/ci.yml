name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm install` (not `npm ci`): esbuild ships per-platform optional packages,
      # and a lockfile generated on one OS can list another OS's sibling in a way
      # that makes the strict `npm ci` check fail EBADPLATFORM on the CI runner.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          # Build-time only; placeholder public values so the bundle compiles in CI.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      - run: npm run test
