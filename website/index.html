<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/emblem.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0e1726" />

    <title>Harbormill Automation — Custom AI automation for small business</title>
    <meta
      name="description"
      content="Damon Williams builds practical AI automation for small businesses — and teaches you to use AI first. Reclaim hours of busywork. Book a free 30-minute intro."
    />
    <link rel="canonical" href="https://harbormill.net/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://harbormill.net/" />
    <meta property="og:title" content="Harbormill Automation — Custom AI automation for small business" />
    <meta
      property="og:description"
      content="Practical AI automation for small businesses, with the Harbormill AIOS operating deck as the flagship. Teach-you-first, then automate. Book a free 30-min intro."
    />
    <meta property="og:image" content="https://harbormill.net/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Harbormill Automation — Custom AI automation for small business" />
    <meta
      name="twitter:description"
      content="Practical AI automation for small businesses. Teach-you-first, then automate. Book a free 30-min intro."
    />
    <meta name="twitter:image" content="https://harbormill.net/og-image.png" />

    <!-- Inter (the product's typeface). 'Inter var' is referenced first in Tailwind; this
         registers the 'Inter' fallback that actually loads. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Harbormill Automation",
        "url": "https://harbormill.net",
        "description": "Custom AI automation and AI enablement for small businesses.",
        "founder": {
          "@type": "Person",
          "name": "Damon Williams",
          "jobTitle": "AI Solutions Engineer",
          "sameAs": "https://www.linkedin.com/in/damon-w-67882768"
        },
        "areaServed": "US",
        "email": "dwilliams@harbormill.net"
      }
    </script>

    <style>
      html { background: #0e1726; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
